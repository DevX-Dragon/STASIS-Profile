<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STASIS // Profile Converter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

  :root {
    --orange: #D94F2B;
    --dark: #3A3A2E;
    --darker: #2A2A1F;
    --grain-opacity: 0.18;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--darker);
    color: var(--orange);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  /* Grain overlay on body */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: var(--grain-opacity);
    pointer-events: none;
    z-index: 9999;
  }

  header {
    width: 100%;
    max-width: 600px;
    margin-bottom: 48px;
    text-align: center;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    letter-spacing: 12px;
    line-height: 1;
    color: var(--orange);
    text-shadow: 0 0 30px rgba(217,79,43,0.4);
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 4px;
    color: rgba(217,79,43,0.5);
    margin-top: 6px;
    text-transform: uppercase;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--orange), transparent);
    margin: 20px 0;
    opacity: 0.4;
  }

  /* Upload zone */
  .upload-zone {
    width: 100%;
    max-width: 500px;
    border: 1px solid rgba(217,79,43,0.3);
    padding: 40px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: border-color 0.2s;
    background: rgba(217,79,43,0.03);
  }

  .upload-zone::before,
  .upload-zone::after,
  .upload-zone .corner-bl,
  .upload-zone .corner-tr {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    border-color: var(--orange);
    border-style: solid;
  }
  .upload-zone::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .upload-zone::after { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
  .upload-zone .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
  .upload-zone .corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }

  .upload-zone:hover { border-color: rgba(217,79,43,0.7); background: rgba(217,79,43,0.06); }
  .upload-zone.drag-over { border-color: var(--orange); background: rgba(217,79,43,0.1); }

  .upload-zone input { display: none; }

  .upload-icon {
    font-size: 36px;
    margin-bottom: 12px;
    opacity: 0.6;
  }

  .upload-text {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .upload-hint {
    font-size: 10px;
    letter-spacing: 1px;
    opacity: 0.35;
    margin-top: 8px;
  }

  /* Controls */
  .controls {
    width: 100%;
    max-width: 500px;
    margin-top: 24px;
    display: none;
    flex-direction: column;
    gap: 16px;
  }

  .controls.visible { display: flex; }

  .control-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .control-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.6;
    width: 120px;
    flex-shrink: 0;
  }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    background: rgba(217,79,43,0.2);
    height: 2px;
    outline: none;
    border-radius: 0;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: var(--orange);
    cursor: pointer;
    border-radius: 0;
  }

  .control-val {
    font-size: 11px;
    width: 36px;
    text-align: right;
    opacity: 0.7;
  }

  .select-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .aspect-btn {
    padding: 6px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    border: 1px solid rgba(217,79,43,0.4);
    background: transparent;
    color: rgba(217,79,43,0.6);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .aspect-btn.active,
  .aspect-btn:hover {
    background: var(--orange);
    color: var(--darker);
    border-color: var(--orange);
  }

  /* Preview area */
  .preview-area {
    margin-top: 40px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    width: 100%;
    max-width: 500px;
  }

  .preview-area.visible { display: flex; }

  .preview-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.4;
    align-self: flex-start;
  }

  #previewCanvas {
    max-width: 100%;
    border: 1px solid rgba(217,79,43,0.25);
    display: block;
    image-rendering: pixelated;
  }

  .btn-download {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 14px 40px;
    border: 1px solid var(--orange);
    background: transparent;
    color: var(--orange);
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
    width: 100%;
  }

  .btn-download::before,
  .btn-download::after {
    content: '';
    position: absolute;
    width: 10px;
    height: 10px;
    border-color: var(--orange);
    border-style: solid;
  }
  .btn-download::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .btn-download::after { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .btn-download:hover { background: var(--orange); color: var(--darker); }

  .status-bar {
    font-size: 10px;
    letter-spacing: 2px;
    opacity: 0.4;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .credits {
    margin-top: 60px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.35;
    text-align: center;
  }

  .credits a {
    color: var(--orange);
    text-decoration: none;
    opacity: 1;
    border-bottom: 1px solid rgba(217,79,43,0.3);
    padding-bottom: 1px;
    transition: opacity 0.15s, border-color 0.15s;
  }

  .credits a:hover {
    opacity: 0.8;
    border-color: var(--orange);
  }
</style>
</head>
<body>

<header>
  <div class="logo">STASIS</div>
  <div class="subtitle">// Profile Image Converter // Hack Club</div>
  <div class="divider"></div>
</header>

<input type="file" id="fileInput" accept="image/*" style="display:none">

<div class="upload-zone" id="uploadZone">
  <span class="corner-bl"></span>
  <span class="corner-tr"></span>
  <div class="upload-icon">⊕</div>
  <div class="upload-text">Drop image or click to upload</div>
  <div class="upload-hint">PNG · JPG · WEBP · any format</div>
</div>

<div class="controls" id="controls">
  <div class="control-row">
    <span class="control-label">Orange Intensity</span>
    <input type="range" id="orangeIntensity" min="0" max="100" value="75">
    <span class="control-val" id="orangeVal">75</span>
  </div>
  <div class="control-row">
    <span class="control-label">Dark Tint</span>
    <input type="range" id="darkTint" min="0" max="100" value="60">
    <span class="control-val" id="darkVal">60</span>
  </div>
  <div class="control-row">
    <span class="control-label">Grain</span>
    <input type="range" id="grainAmount" min="0" max="100" value="40">
    <span class="control-val" id="grainVal">40</span>
  </div>
  <div class="control-row">
    <span class="control-label">Contrast</span>
    <input type="range" id="contrastAmount" min="0" max="100" value="55">
    <span class="control-val" id="contrastVal">55</span>
  </div>
  <div class="control-row">
    <span class="control-label">Output Size</span>
    <div class="select-row">
      <button class="aspect-btn active" data-size="1:1">1:1</button>
      <button class="aspect-btn" data-size="portrait">Portrait</button>
      <button class="aspect-btn" data-size="original">Original</button>
    </div>
  </div>
</div>

<div class="preview-area" id="previewArea">
  <div class="preview-label">// Output Preview</div>
  <canvas id="previewCanvas"></canvas>
  <button class="btn-download" id="downloadBtn">⊕ Download STASIS Profile</button>
  <div class="status-bar" id="statusBar">ready</div>
</div>

<canvas id="offscreen" style="display:none"></canvas>

<div class="credits">
  Built by <a href="https://github.com/DevX-Dragon" target="_blank" rel="noopener">@DevX-Dragon</a> &nbsp;·&nbsp; STASIS // Hack Club
</div>

<script>
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const controls = document.getElementById('controls');
const previewArea = document.getElementById('previewArea');
const previewCanvas = document.getElementById('previewCanvas');
const offscreen = document.getElementById('offscreen');
const downloadBtn = document.getElementById('downloadBtn');
const statusBar = document.getElementById('statusBar');

let currentImage = null;
let selectedSize = '1:1';

// Upload handlers
uploadZone.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });
fileInput.addEventListener('click', (e) => e.stopPropagation());

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImage(file);
});

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadImage(e.target.files[0]);
});

function loadImage(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    currentImage = img;
    controls.classList.add('visible');
    previewArea.classList.add('visible');
    render();
    statusBar.textContent = `loaded: ${file.name}`;
    URL.revokeObjectURL(url);
  };
  img.onerror = () => {
    statusBar.textContent = 'error loading image — try another file';
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

// Controls
document.querySelectorAll('.aspect-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.aspect-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedSize = btn.dataset.size;
    render();
  });
});

function bindSlider(id, valId) {
  const slider = document.getElementById(id);
  const val = document.getElementById(valId);
  slider.addEventListener('input', () => { val.textContent = slider.value; render(); });
}
bindSlider('orangeIntensity', 'orangeVal');
bindSlider('darkTint', 'darkVal');
bindSlider('grainAmount', 'grainVal');
bindSlider('contrastAmount', 'contrastVal');

// Core render
function render() {
  if (!currentImage) return;
  statusBar.textContent = 'processing...';

  const orangeIntensity = parseInt(document.getElementById('orangeIntensity').value) / 100;
  const darkTint = parseInt(document.getElementById('darkTint').value) / 100;
  const grainAmount = parseInt(document.getElementById('grainAmount').value) / 100;
  const contrastAmount = parseInt(document.getElementById('contrastAmount').value) / 100;

  // Determine output dimensions
  let outW, outH;
  const aspect = currentImage.width / currentImage.height;

  if (selectedSize === '1:1') {
    outW = outH = 600;
  } else if (selectedSize === 'portrait') {
    outW = 600; outH = 1200;
  } else {
    outW = currentImage.width;
    outH = currentImage.height;
  }

  offscreen.width = outW;
  offscreen.height = outH;
  const ctx = offscreen.getContext('2d');

  // Draw original image centered/cropped
  ctx.fillStyle = '#2A2A1F';
  ctx.fillRect(0, 0, outW, outH);

  const scale = Math.max(outW / currentImage.width, outH / currentImage.height);
  const drawW = currentImage.width * scale;
  const drawH = currentImage.height * scale;
  const drawX = (outW - drawW) / 2;
  const drawY = (outH - drawH) / 2;
  ctx.drawImage(currentImage, drawX, drawY, drawW, drawH);

  // Get pixel data
  const imgData = ctx.getImageData(0, 0, outW, outH);
  const d = imgData.data;

  // Dark bg color: #3A3A2E -> (58, 58, 46)
  // Orange: #D94F2B -> (217, 79, 43)

  for (let i = 0; i < d.length; i += 4) {
    const r = d[i], g = d[i+1], b = d[i+2];

    // Convert to luminance
    let lum = 0.299 * r + 0.587 * g + 0.114 * b;

    // Apply contrast
    const contrast = contrastAmount * 2;
    lum = ((lum / 255 - 0.5) * (1 + contrast) + 0.5) * 255;
    lum = Math.max(0, Math.min(255, lum));

    const t = lum / 255; // 0 = dark, 1 = light

    // Duotone: dark color (#3A3A2E) to orange (#D94F2B)
    // More orange in bright areas, more dark in shadows
    const darkR = 42, darkG = 42, darkB = 30;   // #2A2A1E
    const midR = 58, midG = 58, midB = 46;       // #3A3A2E
    const orR = 217, orG = 79, orB = 43;         // #D94F2B

    // Duotone blend
    let finalR, finalG, finalB;

    // Blend dark → orange based on luminance
    const blend = Math.pow(t, 1.0 - orangeIntensity * 0.5);

    finalR = darkR + (orR - darkR) * blend;
    finalG = darkG + (orG - darkG) * blend;
    finalB = darkB + (orB - darkB) * blend;

    // Apply dark tint (push shadows darker)
    finalR = finalR * (1 - darkTint * 0.3 * (1 - t));
    finalG = finalG * (1 - darkTint * 0.3 * (1 - t));
    finalB = finalB * (1 - darkTint * 0.3 * (1 - t));

    // Add grain
    const grain = (Math.random() - 0.5) * grainAmount * 60;
    d[i]   = Math.max(0, Math.min(255, finalR + grain));
    d[i+1] = Math.max(0, Math.min(255, finalG + grain));
    d[i+2] = Math.max(0, Math.min(255, finalB + grain));
    d[i+3] = 255;
  }

  ctx.putImageData(imgData, 0, 0);

  // Draw overlay elements
  drawOverlay(ctx, outW, outH);

  // Show on preview canvas
  previewCanvas.width = outW;
  previewCanvas.height = outH;
  const pCtx = previewCanvas.getContext('2d');
  pCtx.drawImage(offscreen, 0, 0);

  statusBar.textContent = `output: ${outW}×${outH}px`;
}

function drawOverlay(ctx, w, h) {
  const orange = '#D94F2B';
  const bracketSize = Math.min(w, h) * 0.065;
  const pad = Math.min(w, h) * 0.03;
  const thickness = Math.max(2, w * 0.004);

  ctx.strokeStyle = orange;
  ctx.lineWidth = thickness;
  ctx.lineCap = 'square';

  // Corner brackets
  // Top-left
  drawBracket(ctx, pad, pad, bracketSize, 1, 1);
  // Top-right
  drawBracket(ctx, w - pad, pad, bracketSize, -1, 1);
  // Bottom-left
  drawBracket(ctx, pad, h - pad, bracketSize, 1, -1);
  // Bottom-right
  drawBracket(ctx, w - pad, h - pad, bracketSize, -1, -1);

  // STASIS text watermark (bottom-right area)
  const fontSize = Math.max(12, w * 0.042);
  ctx.font = `${fontSize}px 'Share Tech Mono', monospace`;
  ctx.fillStyle = orange;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText('STASIS', w - pad - 2, h - pad - 2);

  // Subtle scan line effect on top portion
  ctx.globalAlpha = 0.04;
  ctx.fillStyle = orange;
  for (let y = 0; y < h; y += 4) {
    ctx.fillRect(0, y, w, 1);
  }
  ctx.globalAlpha = 1;
}

function drawBracket(ctx, x, y, size, dx, dy) {
  ctx.beginPath();
  ctx.moveTo(x + dx * size, y);
  ctx.lineTo(x, y);
  ctx.lineTo(x, y + dy * size);
  ctx.stroke();
}

// Download
downloadBtn.addEventListener('click', () => {
  if (!offscreen.width) return;
  const link = document.createElement('a');
  link.download = 'stasis-profile.png';
  link.href = offscreen.toDataURL('image/png');
  link.click();
  statusBar.textContent = 'downloaded ✓';
});
</script>
</body>
</html>
